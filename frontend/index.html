<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Pixel Office</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-latin.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 20px 0;
            gap: 20px;
            overflow-x: hidden;
        }
        /* Bottom Panel Container */
        #bottom-panels {
            display: flex;
            gap: 20px;
            width: 1280px;
            max-width: 95vw;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
            width: 1280px;
            height: 720px;
            max-width: 95vw;
            /* Use on mobile“Visible Height”Limit to avoid being squeezed and cut by bottom panel */
            max-height: 70vh;
            /* Key: Force container retention 16:9, avoid canvas Stretched and distorted in different layouts */
            aspect-ratio: 16 / 9;
        }
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            /* Fallback: Do not stretch even if outer height changes */
            object-fit: contain;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }
        #loading-text {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
        }
        #loading-progress-container {
            width: 300px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 4px;
        }
        #loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            width: 0%;
            transition: width 0.3s ease;
        }
        #status-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 4px;
            max-width: 90%;
            text-align: center;
            font-family: 'ArkPixel', 'Courier New', monospace;
        }
        /* Status control bar */
        #control-bar {
            background: #2c2f3a;
            padding: 10px 10px 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 380px;
            height: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #control-bar-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding: 6px 0 10px;
            border-bottom: 2px solid #4a4f5f;
        }
        #control-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
            padding-top: 4px;
        }
        #control-buttons button { height: 52px; }
        #control-bar button {
            background: #3a3f4f;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 8px 10px;
            cursor: pointer;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            transition: all 0.2s;
        }
        #control-bar button:hover {
            background: #4a4f5f;
            border-color: #e94560;
        }
        /* Guest Agent List Panel (bottom right) */
        #guest-agent-panel {
            width: 360px;
            height: 300px;
            background: #2c2f3a;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e94560;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #guest-agent-panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a4f5f;
            margin-bottom: 6px;
        }
        #guest-agent-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        #guest-agent-list::-webkit-scrollbar { width: 6px; }
        #guest-agent-list::-webkit-scrollbar-track { background: #1a1a2e; }
        #guest-agent-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .guest-agent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #3a3f4f;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #555;
        }
        .guest-agent-name {
            color: #fff;
            font-size: 14px;
            flex-shrink: 0;
        }
        .guest-agent-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .guest-agent-buttons button {
            padding: 6px 10px;
            border-radius: 4px;
            border: 2px solid #555;
            background: #4a4f5f;
            color: #fff;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .guest-agent-buttons button:hover {
            background: #5a5f6f;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn {
            background: #5a1818;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn:hover {
            background: #6a2828;
        }
        /* Memo Area - 4:3 Small square */
        #memo-panel {
            width: 400px;
            height: 300px;
            background-image: url('/static/memo-bg.png');
            background-size: cover;
            background-position: center;
            border: 3px solid #e94560;
            border-radius: 8px;
            padding: 14px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #memo-title {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        #memo-date {
            color: #888;
            font-size: 10px;
            margin-bottom: 8px;
            text-align: right;
            flex-shrink: 0;
            position: relative;
            left: -30px; /* move date left by 30px */
        }
        #memo-content {
            color: #3b3b32;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            position: relative;
            left: 80px; /* move content right by 80px */
        }
        #memo-content::-webkit-scrollbar {
            width: 6px;
        }
        #memo-content::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        #memo-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #memo-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .memo-decoration {
            text-align: center;
            margin: 4px 0;
            color: #555;
            font-size: 10px;
            flex-shrink: 0;
        }

        /* Mobile-specific adaptation (does not affect desktop) */
        @media (max-width: 900px), (pointer: coarse) {
            html, body {
                height: 100%;
            }

            body {
                padding: 0;
                gap: 0;
                overflow-x: hidden;
                overflow-y: auto;
                align-items: stretch;
            }

            #game-container {
                width: 100vw;
                height: 66.666vh; /* Office occupied 2/3 Screen Height */
                max-width: 100vw;
                max-height: 66.666vh;
                border-width: 0;
                border-radius: 0;
                aspect-ratio: auto;
                flex: 0 0 auto;
                touch-action: pan-y; /* Preserve vertical scroll gestures */
                overflow: hidden;
            }

            #bottom-panels {
                width: 100vw;
                max-width: 100vw;
                min-height: 33.334vh; /* About remaining 1/3 Visible area */
                padding: 10px 10px 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                flex: 0 0 auto;
            }

            #memo-panel,
            #control-bar,
            #guest-agent-panel {
                width: 100%;
                height: auto;
                min-height: 180px;
            }

            #memo-panel { min-height: 220px; }
            #control-bar { min-height: 210px; }
            #guest-agent-panel { min-height: 220px; }

            #memo-date {
                left: 0;
                text-align: left;
                margin-bottom: 6px;
            }
            #memo-content {
                left: 0;
                font-size: 13px;
                line-height: 1.7;
            }

            #control-bar-title,
            #guest-agent-panel-title,
            #memo-title {
                font-size: 14px;
            }

            #control-buttons button,
            #control-bar button,
            .guest-agent-buttons button {
                font-size: 12px;
                min-height: 44px;
            }

            .guest-agent-item {
                align-items: flex-start;
                gap: 10px;
                flex-direction: column;
            }
            .guest-agent-buttons {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #status-text {
                bottom: 8px;
                font-size: 12px;
                padding: 8px 12px;
            }

            #coords-toggle,
            #pan-toggle {
                font-size: 12px !important;
                padding: 6px 8px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Load mask -->
    <div id="loading-overlay">
        <div id="loading-text">Loading Star Pixel Office...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>

    <div id="game-container"></div>
    
    <!-- Bottom Panel Container -->
    <div id="bottom-panels">

        <div id="memo-panel">

                <button onclick='setState(\'idle\',\'Standby\')'>Standby</button>

    <div id="status-text">Loading...</div>
    <div id="coords-overlay" style="display:none; position:fixed; pointer-events:none; background:rgba(0,0,0,0.85); color:#fff; font-family:ArkPixel,monospace; font-size:14px; padding:8px 12px; border-radius:4px; z-index:99999;">

        Show coordinates
    </button>
    <button id="pan-toggle" style="position:fixed; top:calc(env(safe-area-inset-top, 0px) + 12px); left:12px; z-index:999999; padding:8px 10px; font-family:ArkPixel,monospace; font-size:13px; cursor:pointer; border:2px solid #333; border-radius:5px; background:#333; color:#fff;">
        Move view
    </button>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        // Check if the browser supports WebP
        let supportsWebP = false;
        
        // Method 1: Use canvas Detection
        function checkWebPSupport() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                if (canvas.getContext && canvas.getContext('2d')) {
                    resolve(canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0);
                } else {
                    resolve(false);
                }
            });
        }
        
        // Method 2: Use image Detection (backup)
        function checkWebPSupportFallback() {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = 'data:image/webp;base64,UklGRkoAAABXRUJQVlA4WAoAAAAQAAAAAAAAAAAAQUxQSAwAAAABBxAR/Q9ERP8DAABWUDggGAAAADABAJ0BKgEAAQADADQlpAADcAD++/1QAA==';
            });
        }
        
        // Get file extension (based on WebP Support Status)
        function getExt(pngFile) {
            // star-working-spritesheet.png Too wide,WebP Unsupported, always use PNG
            if (pngFile === 'star-working-spritesheet.png') {
                return '.png';
            }
            return supportsWebP ? '.webp' : '.png';
        }

        const IS_TOUCH_DEVICE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || window.matchMedia('(pointer: coarse)').matches;

        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            pixelArt: true,
            // Keep on desktop FIT; Mobile version change RESIZE, make the office area fully utilize the allocated height.
            scale: {
                mode: IS_TOUCH_DEVICE ? Phaser.Scale.RESIZE : Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1280,
                height: 720
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let totalAssets = 0;
        let loadedAssets = 0;
        let loadingProgressBar, loadingProgressContainer, loadingOverlay, loadingText;

        // Memo Related functions
        async function loadMemo() {
            const memoDate = document.getElementById('memo-date');
            const memoContent = document.getElementById('memo-content');
            
            try {
                const response = await fetch('/yesterday-memo?t=' + Date.now(), { cache: 'no-store' });
                const data = await response.json();
                
                if (data.success && data.memo) {
                    memoDate.textContent = data.date || '';
                    memoContent.innerHTML = data.memo.replace(/\n/g, '<br>');
                } else {
                    memoContent.innerHTML = '<div id="memo-placeholder">No notes from yesterday</div>';
                }
            } catch (e) {
                console.error('Loading memo Failure:', e);
                memoContent.innerHTML = '<div id="memo-placeholder">Load failed</div>';
            }
        }

        // Update Loading Progress
        function updateLoadingProgress() {
            loadedAssets++;
            const percent = Math.min(100, Math.round((loadedAssets / totalAssets) * 100));
            if (loadingProgressBar) {
                loadingProgressBar.style.width = percent + '%';
            }
            if (loadingText) {
                loadingText.textContent = `Loading Star Pixel Office... ${percent}%`;
            }
        }

        // Hide loading screen
        function hideLoadingOverlay() {
            setTimeout(() => {
                if (loadingOverlay) {
                    loadingOverlay.style.transition = 'opacity 0.5s ease';
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
            }, 300);
        }

        // Fallback: certain mobile networks/CDN Avoid getting stuck during jitter“Loading”Mask
        setTimeout(() => {
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                hideLoadingOverlay();
            }
        }, 8000);
        
        // Lazy loading canceled (experience first: show decoration on first screen)

        const STATES = {
            idle: { name: 'Standby', area: 'breakroom' },
            writing: { name: 'Organize Documents', area: 'writing' },
            researching: { name: 'Search Information', area: 'researching' },
            executing: { name: 'Execute task', area: 'writing' },
            syncing: { name: 'Sync Backup', area: 'writing' },
            error: { name: 'An error occurred', area: 'error' }
        };

        const BUBBLE_TEXTS = {
            idle: [
                'On Standby: Ears are perked up',
                'I\'m here, ready to start anytime',
                'Clean up the desktop first',
                'Phew——Give the brain a break',
                'Be elegant and efficient today',
                'Waiting for a More Accurate Strike',
                'Coffee\'s Still Hot, Inspiration\'s Still Here',
                'I added for you in the background Buff',
                'Status: Focused / Charging',
                'Kitty says: It\'s okay to slow down'
            ],
            // writing / researching / executing All considered as“Work”
            writing: [
                'Enter focus mode: Do not disturb',
                'First, run through the critical path',
                'I simplify complexity',
                'Put bug Lock in the cage',
                'Halfway through writing, save first',
                'Make every step reversible',
                'Today\'s progress, tomorrow\'s confidence',
                'Converge first, then diverge',
                'Make the system more interpretable',
                'Stay calm, we can win'
            ],
            researching: [
                'I\'m digging for evidence chain',
                'Let me boil down the information into conclusions',
                'Found it: The key is here',
                'First, control the variables',
                'I\'m investigating: why is it like this',
                'Write intuition into validation',
                'Locate first, then optimize',
                'Don\'t rush, draw a cause-and-effect diagram first'
            ],
            executing: [

                'Break tasks into small pieces and tackle them one by one',
                'Start running pipeline',
                'One-click advance: Go',
                'Let the results speak for themselves',
                'Start with the minimum viable, then make it beautiful'
            ],
            syncing: [
                'Syncing: Lock today into the cloud',

                'Writing…Don\'t power off',
                'Hand over changes to timestamp',
                'Cloud sync: click',

            ],
            error: [

            ],
            cat: [
                'Meow~',
                'Glug glug…',
                'Wag the Tail',
                'Sunbathing is the happiest',
                'Someone\'s here to see me!',
                'I\'m the mascot of this office',
                'Stretch',
                'Is today\'s can ready?',
                'Purring',
                'This position has the best view'
            ]
        };

        let game, star, sofa, serverroom, areas = {}, currentState = 'idle', pendingDesiredState = null, statusText, lastFetch = 0, lastBlink = 0, lastBubble = 0, targetX = 660, targetY = 170, bubble = null, typewriterText = '', typewriterTarget = '', typewriterIndex = 0, lastTypewriter = 0, syncAnimSprite = null, catBubble = null;
        let isMoving = false;
        let waypoints = []; // list of (x,y) to walk through in order
        let lastWanderAt = 0;

        let coordsOverlay, coordsDisplay, coordsToggle;
        let showCoords = false;
        let guestAgents = [];
        let guestSprites = {}; // agentId -> {sprite, nameText}
        let guestBubbles = {}; // agentId -> bubble container
        const GUEST_AVATARS = ['guest_role_1','guest_role_2','guest_role_3','guest_role_4','guest_role_5','guest_role_6'];
        let guestTweens = {};  // agentId -> {move, name}
        let hiddenDemoNames = new Set();
        const DEMO_MODE = new URLSearchParams(window.location.search).get('demo') === '1';
        const FETCH_INTERVAL = 2000;
        const GUEST_AGENTS_FETCH_INTERVAL = 3500;
        const BLINK_INTERVAL = 2500;
        const BUBBLE_INTERVAL = 8000;
        const CAT_BUBBLE_INTERVAL = 18000; // cat bubble much less frequent
        let lastCatBubble = 0;
        let lastGuestAgentsFetch = 0;
        let lastGuestBubbleAt = 0;
        const TYPEWRITER_DELAY = 50;
        let lastSeenGuestIds = new Set(); // Detect new guests to trigger welcome bubble
        let guestWelcomeInitialized = false;

        // Status control bar function (for testing)
        function setState(state, detail) {
            fetch('/set_state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state, detail })
            }).then(() => fetchStatus());
        }

        // Guest Agent Leave Room
        function removeGuestSpriteByName(name) {
            const target = guestAgents.find(a => (a.name || '') === name);
            if (target && guestSprites[target.agentId]) {
                guestSprites[target.agentId].sprite.destroy();
                guestSprites[target.agentId].nameText.destroy();
                delete guestSprites[target.agentId];
            }
            if (target && guestBubbles[target.agentId]) {
                guestBubbles[target.agentId].destroy();
                delete guestBubbles[target.agentId];
            }
        }

        function leaveGuestAgent(agentId, name) {
            fetch('/leave-agent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agentId, name })
            }).then(response => response.json()).then(data => {
                if (data.ok) {
                    // Prioritize by agentId Clean up to avoid accidental renaming
                    if (agentId && guestSprites[agentId]) {
                        guestSprites[agentId].sprite.destroy();
                        guestSprites[agentId].nameText.destroy();
                        delete guestSprites[agentId];
                    }
                    if (agentId && guestBubbles[agentId]) {
                        guestBubbles[agentId].destroy();
                        delete guestBubbles[agentId];
                    }
                    fetchGuestAgents();
                    alert((name || agentId) + ' Has Left the Room');
                } else {
                    // demo agent Not on backend, local hiding allowed
                    if (DEMO_MODE && (name === 'Nika' || name === 'Mercury')) {
                        hiddenDemoNames.add(name);
                        removeGuestSpriteByName(name);
                        renderGuestAgentList();
                        alert(name + ' Left the room (demo)');
                        return;
                    }
                    alert('Failed to leave:' + (data.msg || 'Unknown error'));
                }
            }).catch(error => {
                alert('Request failed:' + error);
            });
        }

        function approveGuestAgent(agentId) {
            fetch('/agent-approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agentId })
            }).then(response => response.json()).then(data => {
                if (data.ok) {
                    fetchGuestAgents();
                    alert('Guest Access Approved');
                } else {
                    alert('Approval Failed:' + (data.msg || 'Unknown error'));
                }
            }).catch(error => {
                alert('Request failed:' + error);
            });
        }

        function rejectGuestAgent(agentId) {
            fetch('/agent-reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agentId })
            }).then(response => response.json()).then(data => {
                if (data.ok) {
                    fetchGuestAgents();
                    alert('Guest rejected');
                } else {
                    alert('Reject failure:' + (data.msg || 'Unknown error'));
                }
            }).catch(error => {
                alert('Request failed:' + error);
            });
        }

        function ensureDemoVisitors() {
            if (!DEMO_MODE) return;
            if (!Array.isArray(window.__demoVisitors) || window.__demoVisitors.length === 0) {
                window.__demoVisitors = [
                    { agentId: 'demo_nika', name: 'Nika', authStatus: 'approved', state: 'writing', bubbleText: 'I\'m working', isDemo: true, updated_at: new Date().toISOString() },
                    { agentId: 'demo_mercury', name: 'Mercury', authStatus: 'approved', state: 'idle', bubbleText: 'I\'m going to lie down in the break room', isDemo: true, updated_at: new Date().toISOString() }
                ];
            }
        }

        function getMergedVisitors() {
            const realVisitors = (guestAgents || []).filter(a => !a.isMain);
            if (!DEMO_MODE) return realVisitors;

            ensureDemoVisitors();
            const demoVisitors = window.__demoVisitors.filter(v => !hiddenDemoNames.has(v.name));
            return [...realVisitors, ...demoVisitors];
        }

        function renderGuestAgentList() {
            const list = document.getElementById('guest-agent-list');
            if (!list) return;

            const visitors = getMergedVisitors();
            if (visitors.length === 0) {
                list.innerHTML = '<div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0;">No guests</div>';
                return;
            }

            list.innerHTML = visitors.map(agent => {
                const name = agent.name || 'Unnamed Guest';
                const authStatus = agent.authStatus || 'pending';
                const state = agent.state || 'idle';
                const statusMap = {
                    approved: 'Authorized',
                    pending: 'Pending Authorization',
                    rejected: 'Rejected',
                    offline: 'Offline'
                };
                const stateMap = {
                    idle: 'Standby',
                    writing: 'Work',
                    researching: 'Research',
                    executing: 'Execute',
                    syncing: 'Sync',
                    error: 'Alert'
                };

                const statusText = statusMap[authStatus] || authStatus;
                const stateText = stateMap[state] || state;
                const subtitle = `${statusText} · ${stateText}`;

                const pendingActions = `<button onclick='alert(\'Swap skill Feature in Development\')'>Swapskill</button><button class="leave-btn" onclick='leaveGuestAgent(\'${agent.agentId}\',\'${name}\')'>Leave Room</button>`;

                return `
                  <div class="guest-agent-item" data-name="${name}">
                    <div>
                      <div class="guest-agent-name">${name}</div>
                      <div style="font-size:11px;color:#cbd5e1;">${subtitle}</div>
                    </div>
                    <div class="guest-agent-buttons">
                      ${pendingActions}
                    </div>
                  </div>
                `;
            }).join('');

        function getAreaRect(area) {
            // Area Coordinates (Provided by Star, Top Left-Bottom right; here x/y As sprite Use bottom anchor coordinates)
            // Break Room Area (511,262)(841,621)
            // Work area range (190,526)(380,683)
            // error Area Range (932,275)(1109,327)
            const rects = {
                breakroom: { x1: 511, y1: 262, x2: 841, y2: 621 },
                writing:   { x1: 190, y1: 526, x2: 380, y2: 683 },
                error:     { x1: 932, y1: 275, x2: 1109, y2: 327 }
            };
            return rects[area] || rects.breakroom;
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomPointInRect(rect) {
            return { x: randomInt(rect.x1, rect.x2), y: randomInt(rect.y1, rect.y2) };
        }

        function getAreaPoint(area, idx) {
            // Non demo Guest: still use fixed position to avoid shaking with each poll.
            const map = {
                breakroom: [
                    { x: 511, y: 262 },
                    { x: 841, y: 621 },
                    { x: 690, y: 470 }
                ],
                writing: [
                    { x: 190, y: 526 },
                    { x: 380, y: 683 },
                    { x: 300, y: 610 }
                ],
                error: [
                    { x: 932, y: 275 },
                    { x: 1109, y: 327 },
                    { x: 1020, y: 305 }
                ]
            };
            const arr = map[area] || map.breakroom;
            return arr[idx % arr.length];
        }

        function renderGuestAgentsInScene() {
            if (!game) return;
            const visitors = getMergedVisitors();
            const seenIds = new Set();
            let idxBreak = 0, idxWrite = 0, idxError = 0;

            visitors.forEach(agent => {
                const id = agent.agentId;
                seenIds.add(id);

                const isDemo = !!agent.isDemo || (DEMO_MODE && (id === 'demo_nika' || id === 'demo_mercury' || agent.name === 'Nika' || agent.name === 'Mercury'));
                const area = agent.area || (agent.state === 'error' ? 'error' : (agent.state === 'idle' ? 'breakroom' : 'writing'));

                const idx = area === 'breakroom' ? idxBreak++ : area === 'error' ? idxError++ : idxWrite++;
                const p = isDemo
                    ? randomPointInRect(getAreaRect(area))
                    : getAreaPoint(area, idx);

                if (!guestSprites[id]) {
                    // Prioritize using icons:demo visitor Has dedicated mapping
                    let sprite;
                    const isDemoNika = DEMO_MODE && (agent.agentId === 'demo_nika' || agent.name === 'Nika');
                    const isDemoMercury = DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === 'Mercury');
                    
                    if (isDemoNika && game.textures.exists('demo_mercury')) {
                        // Swap mapping: Nika uses demo_mercury
                        sprite = game.add.image(p.x, p.y, 'demo_mercury').setOrigin(0.5, 1).setScale(1.10);
                    } else if (isDemoMercury && game.textures.exists('demo_nika')) {
                        // Exchange mapping: used by Mercury demo_nika
                        sprite = game.add.image(p.x, p.y, 'demo_nika').setOrigin(0.5, 1).setScale(1.10);
                    } else if ((agent.name === 'Nika') && game.textures.exists('guestagent1')) {
                        sprite = game.add.image(p.x, p.y, 'guestagent1').setOrigin(0.5, 1).setScale(1.15);
                    } else if ((agent.name === 'Mercury') && game.textures.exists('guestagent2')) {
                        sprite = game.add.image(p.x, p.y, 'guestagent2').setOrigin(0.5, 1).setScale(1.05);
                    } else {
                        // Non demo Guest: prioritize animated sprites (guest_anim_x), then static image, fallback star
                        // Determine role index first (1-6)
                        let animIdx = agent.avatar
                            ? parseInt((agent.avatar.match(/_(\d+)$/) || [])[1] || '0', 10)
                            : 0;
                        if (!animIdx || animIdx < 1 || animIdx > 6) {
                            const aid = String(agent.agentId || '');
                            let hash = 0;
                            for (let i = 0; i < aid.length; i++) hash = (hash * 31 + aid.charCodeAt(i)) >>> 0;
                            animIdx = (hash % 6) + 1;
                        }
                        const animKey = `guest_anim_${animIdx}`;
                        const animIdleKey = `guest_anim_${animIdx}_idle`;

                        if (game.textures.exists(animKey) && game.anims.exists(animIdleKey)) {
                            sprite = game.add.sprite(p.x, p.y, animKey).setOrigin(0.5, 1).setScale(4.0);
                            sprite.anims.play(animIdleKey, true);
                        } else {
                            const staticAvatarKey = agent.avatar && game.textures.exists(agent.avatar)
                                ? agent.avatar
                                : (() => {
                                    const aid = String(agent.agentId || '');
                                    let hash = 0;
                                    for (let i = 0; i < aid.length; i++) hash = (hash * 31 + aid.charCodeAt(i)) >>> 0;
                                    return GUEST_AVATARS[hash % GUEST_AVATARS.length];
                                })();

                            if (staticAvatarKey && game.textures.exists(staticAvatarKey)) {
                                sprite = game.add.image(p.x, p.y, staticAvatarKey).setOrigin(0.5, 1).setScale(1.15);
                            } else {
                                sprite = game.add.text(p.x, p.y, '⭐', { fontFamily: 'ArkPixel, monospace', fontSize: '30px' }).setOrigin(0.5, 1);
                            }
                        }
                    }
                    sprite.setDepth(2600);
                    if (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === 'Mercury')) {
                        sprite.y = sprite.y + 10;
                    }

                    // demo Mercury moving down 10px(Only demo_mercury)
                    const yOffset = (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === 'Mercury')) ? 10 : 0;

                    const nameTextY = isDemo ? ((p.y + yOffset) - 80) : ((p.y + yOffset) - 120);
                    const nameText = game.add.text(p.x, nameTextY, agent.name || 'Guest', {
                        fontFamily: 'ArkPixel, monospace',
                        fontSize: isDemo ? '16px' : '15px',
                        fill: '#ffffff',
                        stroke: '#000',
                        strokeThickness: 3
                    }).setOrigin(0.5);
                    nameText.setDepth(2601);

                    guestSprites[id] = { sprite, nameText };
                } else {
                    const g = guestSprites[id];
                    const yOffset = (DEMO_MODE && (agent.agentId === 'demo_mercury' || agent.name === 'Mercury')) ? 10 : 0;

                    // demo: Smooth movement (avoid flickering); non- demo: Maintain stable position (avoid polling jitter)
                    if (isDemo) {
                        // kill previous tweens for this id
                        if (guestTweens[id] && guestTweens[id].move) {
                            guestTweens[id].move.stop();
                        }
                        if (guestTweens[id] && guestTweens[id].name) {
                            guestTweens[id].name.stop();
                        }

                        const duration = 2000 + Math.floor(Math.random() * 1000); // 2~3s Walking feel
                        const ease = 'Sine.easeInOut';

                        const moveTween = game.tweens.add({
                            targets: g.sprite,
                            x: p.x,
                            y: p.y + yOffset,
                            duration,
                            ease
                        });
                        const nameTween = game.tweens.add({
                            targets: g.nameText,
                            x: p.x,
                            y: (p.y + yOffset) - 80,
                            duration,
                            ease
                        });
                        guestTweens[id] = { move: moveTween, name: nameTween };
                    } else {
                        g.sprite.x = p.x;
                        g.sprite.y = p.y + yOffset;
                        g.nameText.x = p.x;
                        g.nameText.y = (p.y + yOffset) - 120;
                    }

                    g.nameText.setText(agent.name || 'Guest');
                }
            });

            // Delete disappeared agent + Clear its bubble/tween
            Object.keys(guestSprites).forEach(id => {
                if (!seenIds.has(id)) {
                    guestSprites[id].sprite.destroy();
                    guestSprites[id].nameText.destroy();
                    delete guestSprites[id];
                    if (guestBubbles[id]) {
                        guestBubbles[id].destroy();
                        delete guestBubbles[id];
                    }
                    if (guestTweens[id]) {
                        try { guestTweens[id].move && guestTweens[id].move.stop(); } catch(e) {}
                        try { guestTweens[id].name && guestTweens[id].name.stop(); } catch(e) {}
                        delete guestTweens[id];
                    }
                }
            });
        }

        function maybeShowGuestBubble(time) {
            if (time - lastGuestBubbleAt < 5200) return;
            lastGuestBubbleAt = time;
            const ids = Object.keys(guestSprites);
            if (ids.length === 0) return;
            const id = ids[Math.floor(Math.random() * ids.length)];
            const g = guestSprites[id];

            // demo Bubble: Prioritize displaying content corresponding to status for easy verification“Status→Area→Bubble”Link
            const demoVisitor = (DEMO_MODE && window.__demoVisitors)
                ? (window.__demoVisitors.find(v => v.agentId === id) || window.__demoVisitors.find(v => v.name === (g.nameText && g.nameText.text)))
                : null;

            const statusThoughtsMap = {
                idle: ['I\'m on standby in the break room', 'Relax for a Bit, Wait for the Next Task', 'I\'m resting and recharging'],
                writing: ['I\'m handling tasks in the workspace', 'Organizing documents and executing', 'Focused Progress in Workspace'],
                researching: ['I\'m in research mode, gathering information', 'Researching and verifying clues', 'Researching, will sync conclusions later'],
                executing: ['Executing, running process', 'I\'m advancing tasks in the work area', 'Executing the plan'],
                syncing: ['Syncing, updating status soon', 'Syncing progress to system', 'Data syncing, please wait'],
                error: ['I am at bug Zone troubleshooting', 'Anomaly detected, fixing', 'In alert, locate first then handle']
            };
            const agentState = (guestAgents.find(a => a.agentId === id) || {}).state || 'idle';
            const thoughts = statusThoughtsMap[agentState] || statusThoughtsMap.idle;
            const text = (demoVisitor && demoVisitor.bubbleText) ? demoVisitor.bubbleText : thoughts[Math.floor(Math.random() * thoughts.length)];

            if (guestBubbles[id]) {
                guestBubbles[id].destroy();
                delete guestBubbles[id];
            }

            const bx = g.sprite.x;
            // Bubble position:demo Maintain original logic; real guests placed in“Above the name”, avoid compressing roles and names
            const isDemoGuest = (demoVisitor && demoVisitor.isDemo) || (id === 'demo_nika' || id === 'demo_mercury');
            const nameH = (g.nameText && g.nameText.height) ? g.nameText.height : 16;
            const by = isDemoGuest ? (g.sprite.y - 90) : ((g.nameText ? g.nameText.y : (g.sprite.y - 150)) - (nameH / 2) - 22);
            const fontSize = IS_TOUCH_DEVICE ? 14 : 12;
            const bg = game.add.rectangle(bx, by, text.length * 10 + 24, 28, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            const txt = game.add.text(bx, by, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000' }).setOrigin(0.5);
            const bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(2700);
            guestBubbles[id] = bubble;

            // Make the bubble follow sprite Anchor (for demo Keep aligned during smooth movement)
            bubble.__followAgentId = id;

            setTimeout(() => {
                if (guestBubbles[id]) {
                    guestBubbles[id].destroy();
                    delete guestBubbles[id];
                }
            }, 3200);
        }

        function maybeRandomizeDemoVisitors() {
            if (!DEMO_MODE) return;
            ensureDemoVisitors();

            // As per Star's request: every 8 Switch state every second
            window.__demoNextAt = window.__demoNextAt || 0;
            const now = Date.now();
            if (now < window.__demoNextAt) return;
            window.__demoNextAt = now + 8000;

            const states = ['idle', 'writing', 'researching', 'executing', 'syncing', 'error'];
            const bubbleTextMap = {
                idle: 'I\'m going to lie down in the break room',
                writing: 'I\'m working',
                researching: 'I\'m researching',
                executing: 'Executing task',
                syncing: 'I\'m in sync mode',
                error: 'Error! Heading to the alert zone'
            };

            // Ensure two digits demo Character won't always be in the same state (increase observability)
            const pickJs = (exclude) => {
                let s = states[Math.floor(Math.random() * states.length)];
                let tries = 0;
                while (exclude && s === exclude && tries < 5) {
                    s = states[Math.floor(Math.random() * states.length)];
                    tries++;
                }
                return s;
            };

            const current = window.__demoVisitors || [];
            const cur0 = current[0] ? (current[0].state || 'idle') : 'idle';

            const next0 = pickJs(cur0);
            const next1 = pickJs(next0); // Try to be different
            const nextStates = [next0, next1];

            const prevVisitors = current.map((v) => ({ ...v }));
            window.__demoVisitors = current.map((v, i) => {
                const nextState = nextStates[i] || pickJs(v.state);
                return {
                    ...v,
                    state: nextState,
                    bubbleText: bubbleTextMap[nextState] || String(nextState),
                    updated_at: new Date().toISOString()
                };
            });

            // On status switch: each demo All bubble immediately (forced), for clear link verification
            try {
                if (typeof game !== 'undefined' && game) {
                    // Identify actual state changes demo visitor, Force Them to Bubble Up
                    const prevById = {};
                    prevVisitors.forEach(v => { prevById[v.agentId] = v; });
                    const newVisitors = window.__demoVisitors || [];
                    newVisitors.forEach(agent => {
                        const prev = prevById[agent.agentId];
                        const changed = !prev || prev.state !== agent.state;
                        if (changed) {
                            // Direct Bubble
                            if (guestSprites[agent.agentId]) {
                                const g = guestSprites[agent.agentId];
                                const text = agent.bubbleText || '';
                                if (guestBubbles[agent.agentId]) {
                                    guestBubbles[agent.agentId].destroy();
                                    delete guestBubbles[agent.agentId];
                                }
                                const bx = g.sprite.x;
                                const by = g.sprite.y - 90;
                                const fontSize = IS_TOUCH_DEVICE ? 14 : 12;
                                const bg = game.add.rectangle(bx, by, text.length * 10 + 24, 28, 0xffffff, 0.95);
                                bg.setStrokeStyle(2, 0x000000);
                                const txt = game.add.text(bx, by, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000' }).setOrigin(0.5);
                                const bubble = game.add.container(0, 0, [bg, txt]);
                                bubble.setDepth(2700);
                                bubble.__followAgentId = agent.agentId;
                                guestBubbles[agent.agentId] = bubble;
                                setTimeout(() => {
                                    if (guestBubbles[agent.agentId]) {
                                        guestBubbles[agent.agentId].destroy();
                                        delete guestBubbles[agent.agentId];
                                    }
                                }, 3200);
                            }
                        }
                    });
                }
            } catch (e) { console.error('Forced bubbling failed:', e); }
        }

        function fetchGuestAgents() {
            // demo Update random status first (does not rely on backend)
            maybeRandomizeDemoVisitors();

            return fetch('/agents?t=' + Date.now(), { cache: 'no-store' })
                .then(response => response.json())
                .then(data => {
                    // Regardless of whether the backend returns an array,demo=1 Ensure local demo Visible to Guests
                    guestAgents = Array.isArray(data) ? data : [];

                    // New guest detection: Triggered Star Welcome Bubble (only welcomes real guests, not demo)
                    try {
                        const merged = getMergedVisitors();
                        const currentIds = new Set((merged || []).filter(a => !a.isMain && !a.isDemo).map(a => a.agentId));

                        if (!guestWelcomeInitialized) {
                            // No Welcome on First Initialization to Avoid Screen Flooding
                            lastSeenGuestIds = currentIds;
                            guestWelcomeInitialized = true;
                        } else {
                            const newIds = [];
                            currentIds.forEach(id => { if (!lastSeenGuestIds.has(id)) newIds.push(id); });

                            if (newIds.length > 0) {
                                // Only welcome the first newcomer (to avoid screen flooding)
                                const newAgent = (merged || []).find(a => a.agentId === newIds[0]);
                                if (newAgent && newAgent.name) {
                                    // Temporarily currentState Considered As writing To allow showBubble Display
                                    const oldState = currentState;
                                    currentState = 'writing';
                                    // Temporary Replacement bubble Copy
                                    const oldTexts = BUBBLE_TEXTS.writing;
                                    BUBBLE_TEXTS.writing = [
                                        `Welcome ${newAgent.name} Welcome to the office~`,
                                        `Hi ${newAgent.name}, let\'s get to work`,
                                        `${newAgent.name} Joined, Welcome!`
                                    ];
                                    showBubble();
                                    // Restore
                                    BUBBLE_TEXTS.writing = oldTexts;
                                    currentState = oldState;
                                }
                            }

                            lastSeenGuestIds = currentIds;
                        }
                    } catch (e) { /* ignore */ }

                    renderGuestAgentList();
                    renderGuestAgentsInScene();
                })
                .catch(error => {
                    console.error('Failed to fetch guest list:', error);
                    // Even if fetching fails,demo Must be able to render
                    if (DEMO_MODE) {
                        renderGuestAgentList();
                        renderGuestAgentsInScene();
                    }
                });
        }

            // Allow Mobile Access“Drag/Slide”To move the view (essence: move Phaser Camera)
            // iPhone Default on for touch devices; default off for desktop (can be manually enabled).
            const panToggle = document.getElementById('pan-toggle');
            const isTouchDevice = IS_TOUCH_DEVICE;
            let panEnabled = false;
            let isPanning = false;
            let panStart = null; // {x,y,sx,sy}
            const camera = game.cameras.main;

            const MAP_W = config.width;
            const MAP_H = config.height;
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
            function maxScrollX() {
                const viewportW = camera.width / Math.max(0.01, camera.zoom);
                return Math.max(0, MAP_W - viewportW);
            }
            function maxScrollY() {
                const viewportH = camera.height / Math.max(0.01, camera.zoom);
                return Math.max(0, MAP_H - viewportH);
            }
            function clampCameraScroll() {
                camera.scrollX = clamp(camera.scrollX, 0, maxScrollX());
                camera.scrollY = clamp(camera.scrollY, 0, maxScrollY());
            }

            // On Mobile: Lock“Office canvas height = 2/3 Area height”,
            // Ensure the world coordinates fit vertically (no need for up/down drag), only keep horizontal drag for left/right browsing.
            // Record if initial manual panning occurred (avoid resize Reset user-dragged positions
            let hasManuallyPanned = false;
            function applyMobileCameraFit() {
                if (!isTouchDevice) return;
                const h = Math.max(1, camera.height);
                const w = Math.max(1, camera.width);

                // Key: prioritize height fit, Then Check if Width Adjustment is Needed,
                // Ensure the screen doesn't skew, and can drag left and right without being cut off.
                const fitHeightZoom = h / MAP_H;
                const candidateZoom = fitHeightZoom;

                // By candidateZoom Calculate:viewport Width and height in world coordinates
                const viewW = w / candidateZoom;
                const maxX = Math.max(0, MAP_W - viewW);

                camera.setZoom(candidateZoom);
                camera.scrollX = Math.min(camera.scrollX, maxX);
                camera.scrollY = 0;

                // Center only if not manually panned (to avoid overwriting user\'s position)
                if (!hasManuallyPanned) {
                    camera.centerOn(MAP_W / 2, MAP_H / 2);
                }
                camera.scrollX = clamp(camera.scrollX, 0, maxX);
                camera.scrollY = 0;
            }
            applyMobileCameraFit();

            // Rotate screen on mobile/Recalculate when address bar resizes zoom + Clamp camera
            if (isTouchDevice && game.scale) {
                game.scale.on('resize', () => {
                    applyMobileCameraFit();
                });
            }

            camera.setBounds(0, 0, MAP_W, MAP_H);
            clampCameraScroll();

            function setPanEnabled(on) {
                panEnabled = on;
                if (panToggle) {
                    panToggle.textContent = on ? 'Lock View' : 'Move view';
                    panToggle.style.background = on ? '#e94560' : '#333';
                }
                game.input.setDefaultCursor(on ? 'grab' : 'default');
            }

            if (panToggle) {
                panToggle.addEventListener('click', () => setPanEnabled(!panEnabled));
            }

            // Touch devices default to drag view, avoiding the need to press a button first
            if (isTouchDevice) {
                setPanEnabled(true);
            }

            // iOS/Safari Gesture strategy:
            // - Keep vertical scrolling (to view three panels)
            // - Prevent default behavior only when dragging horizontally, and convert to camera Horizontal Pan
            // Description:iOS Correct pointer + touch-action Support for device model differences, so add a native set here touch Fallback.
            const canvasEl = game.canvas;
            let touchPan = null; // {x,y,sx,sy,lock:'x'|'y'|null}
            if (canvasEl) {
                canvasEl.style.touchAction = 'pan-y';

                canvasEl.addEventListener('touchstart', (e) => {
                    if (!panEnabled || e.touches.length !== 1) return;
                    const t = e.touches[0];
                    touchPan = { x: t.clientX, y: t.clientY, sx: camera.scrollX, sy: camera.scrollY, lock: null };
                }, { passive: true });

                canvasEl.addEventListener('touchmove', (e) => {
                    if (!panEnabled || !touchPan || e.touches.length !== 1) return;
                    const t = e.touches[0];
                    const dx = t.clientX - touchPan.x;
                    const dy = t.clientY - touchPan.y;

                    if (!touchPan.lock) {
                        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
                        touchPan.lock = Math.abs(dx) >= Math.abs(dy) ? 'x' : 'y';
                    }

                    if (touchPan.lock === 'x') {
                        // Horizontal drag for office view; prevent default browser scrolling
                        e.preventDefault();
                        hasManuallyPanned = true;
                        camera.scrollX = clamp(touchPan.sx - dx, 0, maxScrollX());
                    }
                    // lock==='y' Do not block default when scrolling vertically on the page
                }, { passive: false });

                const clearTouchPan = () => { touchPan = null; };
                canvasEl.addEventListener('touchend', clearTouchPan, { passive: true });
                canvasEl.addEventListener('touchcancel', clearTouchPan, { passive: true });
            }

            game.input.on('pointerdown', (pointer) => {
                if (!panEnabled) return;
                isPanning = true;
                panStart = { x: pointer.x, y: pointer.y, sx: camera.scrollX, sy: camera.scrollY };
                game.input.setDefaultCursor('grabbing');
            });

            game.input.on('pointerup', () => {
                if (!panEnabled) return;
                isPanning = false;
                panStart = null;
                game.input.setDefaultCursor('grab');
            });

            game.input.on('pointermove', (pointer) => {
                if (!panEnabled || !isPanning || !panStart) return;
                const dx = pointer.x - panStart.x;
                const dy = pointer.y - panStart.y;

                // Mobile first“Drag horizontally to view the office”, vertical gestures reserved for page scrolling to view lower panels.
                if (isTouchDevice && Math.abs(dy) > Math.abs(dx)) {
                    return;
                }

                // Drag finger to the right, view follows to the right:camera scroll Decrease to the left (reverse)
                const newX = panStart.sx - dx;
                hasManuallyPanned = true;
                camera.scrollX = clamp(newX, 0, maxScrollX());

                // Desktop retains free 2D dragging
                if (!isTouchDevice) {
                    const newY = panStart.sy - dy;
                    camera.scrollY = clamp(newY, 0, maxScrollY());
                }
            });

            // Mouse move handler for coordinate display
            game.input.on('pointermove', (pointer) => {
                if (!showCoords) return;
                // Clamp to map size (0..width-1 / 0..height-1)
                const x = Math.max(0, Math.min(config.width - 1, Math.round(pointer.x)));
                const y = Math.max(0, Math.min(config.height - 1, Math.round(pointer.y)));
                coordsDisplay.textContent = `${x}, ${y}`;
                // Position overlay next to mouse
                coordsOverlay.style.left = (pointer.x + 18) + 'px';
                coordsOverlay.style.top = (pointer.y + 18) + 'px';
            });

            // Load yesterday memo
            loadMemo();

            fetchStatus();
            fetchGuestAgents();
        }

        function update(time) {
            if (time - lastFetch > FETCH_INTERVAL) { fetchStatus(); lastFetch = time; }
            if (time - lastGuestAgentsFetch > GUEST_AGENTS_FETCH_INTERVAL) { fetchGuestAgents(); lastGuestAgentsFetch = time; }

            // Fallback: No idle Ensure data center animation is playing,idle Static at times
            const effectiveStateForServer = pendingDesiredState || currentState;
            if (serverroom) {
                if (effectiveStateForServer === 'idle') {
                    if (serverroom.anims.isPlaying) {
                        serverroom.anims.stop();
                        serverroom.setFrame(0);
                    }
                } else {
                    if (!serverroom.anims.isPlaying || serverroom.anims.currentAnim?.key !== 'serverroom_on') {
                        serverroom.anims.play('serverroom_on', true);
                    }
                }
            }

            // error Status: Display bug Animation, moving back and forth between two points
            if (window.errorBug) {
                if (effectiveStateForServer === 'error') {
                    window.errorBug.setVisible(true);
                    if (!window.errorBug.anims.isPlaying || window.errorBug.anims.currentAnim?.key !== 'error_bug') {
                        window.errorBug.anims.play('error_bug', true);
                    }
                    // ping-pong move between x=1007 and x=1111 at y=221
                    const leftX = 1007;
                    const rightX = 1111;
                    const speed = 0.6; // -50% speed
                    const dir = window.errorBugDir || 1;
                    window.errorBug.x += speed * dir;
                    window.errorBug.y = 221;
                    if (window.errorBug.x >= rightX) {
                        window.errorBug.x = rightX;
                        window.errorBugDir = -1;
                    } else if (window.errorBug.x <= leftX) {
                        window.errorBug.x = leftX;
                        window.errorBugDir = 1;
                    }
                } else {
                    window.errorBug.setVisible(false);
                    window.errorBug.anims.stop();
                }
            }

            // Sync animation fallback logic
            if (syncAnimSprite) {
                if (effectiveStateForServer === 'syncing') {
                    if (!syncAnimSprite.anims.isPlaying || syncAnimSprite.anims.currentAnim?.key !== 'sync_anim') {
                        syncAnimSprite.anims.play('sync_anim', true);
                    }
                } else {
                    if (syncAnimSprite.anims.isPlaying) syncAnimSprite.anims.stop();
                    syncAnimSprite.setFrame(0);
                }
            }

            // Bubble up
            if (time - lastBubble > BUBBLE_INTERVAL) {
                showBubble();
                lastBubble = time;
            }
            // Cat\'s bubble (low frequency)
            if (time - lastCatBubble > CAT_BUBBLE_INTERVAL) {
                showCatBubble();
                lastCatBubble = time;
            }

            // Typewriter Effect
            if (typewriterIndex < typewriterTarget.length && time - lastTypewriter > TYPEWRITER_DELAY) {
                typewriterText += typewriterTarget[typewriterIndex];
                statusText.textContent = typewriterText;
                typewriterIndex++;
                lastTypewriter = time;
            }

            // Move + Little stroll
            moveStar(time);

            // guest Random Thought Bubble
            maybeShowGuestBubble(time);

            // demo Smooth movement: make the bubble follow the character anchor each frame (avoid tween Bubble stays in old position)
            try {
                Object.keys(guestBubbles).forEach(id => {
                    const b = guestBubbles[id];
                    const g = guestSprites[id];
                    if (!b || !g) return;
                    if (b.__followAgentId !== id) return;
                    b.x = 0;
                    b.y = 0;
                    // children[0]=bg, children[1]=text
                    const bx = g.sprite.x;
                    const isDemoGuest = (id === 'demo_nika' || id === 'demo_mercury');
                    const nameH = (g.nameText && g.nameText.height) ? g.nameText.height : 16;
                    const by = isDemoGuest ? (g.sprite.y - 90) : ((g.nameText ? g.nameText.y : (g.sprite.y - 150)) - (nameH / 2) - 22);
                    if (b.list && b.list[0]) { b.list[0].x = bx; b.list[0].y = by; }
                    if (b.list && b.list[1]) { b.list[1].x = bx; b.list[1].y = by; }
                });
            } catch (e) {}

            // guest List Refreshes Periodically
        }

        function normalizeState(s) {
            if (!s) return 'idle';
            if (s === 'working') return 'writing';
            if (s === 'run' || s === 'running') return 'executing';
            if (s === 'sync') return 'syncing';
            if (s === 'research') return 'researching';
            return s;
        }

        function fetchStatus() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const nextState = normalizeState(data.state);
                    const stateInfo = STATES[nextState] || STATES.idle;
                    // If we\'re mid-transition, don\'t restart the path every poll
                    const changed = (pendingDesiredState === null) && (nextState !== currentState);
                    const nextLine = '[' + stateInfo.name + '] ' + (data.detail || '...');
                    if (changed) {
                        typewriterTarget = nextLine;
                        typewriterText = '';
                        typewriterIndex = 0;

                        // Set state immediately (no waypoints/path movement)
                        pendingDesiredState = null;
                        currentState = nextState;

                        // Idle: sofa animation
                        if (nextState === 'idle') {
                            // Sofa
                            if (game.textures.exists('sofa_busy')) {
                                sofa.setTexture('sofa_busy');
                                sofa.anims.play('sofa_busy', true);
                            }
                            // Hide moving star, hide desk star
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(false);
                                window.starWorking.anims.stop();
                            }
                        } else if (nextState === 'error') {
                            // Error: no working animation at desk
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(false);
                                window.starWorking.anims.stop();
                            }
                        } else if (nextState === 'syncing') {
                            // Syncing: also no working animation at desk
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(false);
                                window.starWorking.anims.stop();
                            }
                        } else {
                            // Non-idle non-error: starWorking animation at desk
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                            // Hide moving star, show desk star
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(true);
                                window.starWorking.anims.play('star_working', true);
                            }
                        }

                        // Server room logic:
                        if (serverroom) {
                            if (nextState === 'idle') {
                                serverroom.anims.stop();
                                serverroom.setFrame(0);
                            } else {
                                serverroom.anims.play('serverroom_on', true);
                            }
                        }

                        // Sync animation logic:
                        // default: frame 0
                        // state=syncing: play from frame 1
                        if (syncAnimSprite) {
                            if (nextState === 'syncing') {
                                if (!syncAnimSprite.anims.isPlaying || syncAnimSprite.anims.currentAnim?.key !== 'sync_anim') {
                                    syncAnimSprite.anims.play('sync_anim', true);
                                }
                            } else {
                                syncAnimSprite.anims.stop();
                                syncAnimSprite.setFrame(0);
                            }
                        }
                    } else {
                        if (!typewriterTarget || typewriterTarget !== nextLine) {
                            typewriterTarget = nextLine;
                            typewriterText = '';
                            typewriterIndex = 0;
                        }
                    }
                })
                .catch(error => {
                    typewriterTarget = 'Connection Failed, Retrying...';
                    typewriterText = '';
                    typewriterIndex = 0;
                });
        }

        function moveStar(time) {
            // Use pending state if available (for target area during transition)
            const effectiveState = pendingDesiredState || currentState;
            const stateInfo = STATES[effectiveState] || STATES.idle;
            const baseTarget = areas[stateInfo.area] || areas.breakroom;

            const dx = targetX - star.x;
            const dy = targetY - star.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speed = 1.4;
            const wobble = Math.sin(time / 200) * 0.8;

            if (dist > 3) {
                // Move toward current target
                star.x += (dx / dist) * speed;
                star.y += (dy / dist) * speed;
                star.setY(star.y + wobble);
                isMoving = true;
            } else {
                // Arrived at a waypoint or final target
                if (waypoints && waypoints.length > 0) {
                    // Remove the first waypoint (we just arrived there)
                    waypoints.shift();
                    if (waypoints.length > 0) {
                        // Next waypoint exists
                        targetX = waypoints[0].x;
                        targetY = waypoints[0].y;
                        isMoving = true;
                    } else {
                        // Final target: apply pending state and switch visual
                        if (pendingDesiredState !== null) {
                            isMoving = false;
                            currentState = pendingDesiredState;
                            pendingDesiredState = null;

                            if (currentState === 'idle') {
                                // Sitting on sofa: hide Star only when arrived
                                star.setVisible(false);
                                star.anims.stop();
                                if (window.starWorking) {
                                    window.starWorking.setVisible(false);
                                    window.starWorking.anims.stop();
                                }
                            } else {
                                // Arrived at desk area: switch to star_working animation
                                star.setVisible(false);
                                star.anims.stop();
                                if (window.starWorking) {
                                    window.starWorking.setVisible(true);
                                    window.starWorking.anims.play('star_working', true);
                                }
                            }
                        }
                    }
                } else {
                    if (pendingDesiredState !== null) {
                        isMoving = false;
                        currentState = pendingDesiredState;
                        pendingDesiredState = null;

                        if (currentState === 'idle') {
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(false);
                                window.starWorking.anims.stop();
                            }
                            if (game.textures.exists('sofa_busy')) {
                                sofa.setTexture('sofa_busy');
                                sofa.anims.play('sofa_busy', true);
                            }
                        } else {
                            // Arrived at desk area: switch to star_working animation
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(true);
                                window.starWorking.anims.play('star_working', true);
                            }
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                        }
                    }
                }
            }

            // Small wander only after arrival (non-idle)
            // Temporarily disabled to stay in work area; uncomment later if needed
            /*
            if (!isMoving && currentState !== 'idle' && pendingDesiredState === null && (time - lastWanderAt) > 3500) {
                targetX = baseTarget.x + (Math.random() - 0.5) * 60;
                targetY = baseTarget.y + (Math.random() - 0.5) * 40;
                star.setVisible(true);
                star.anims.play('star_idle', true);
                isMoving = true;
                lastWanderAt = time;
            }
            */
        }

        function showBubble() {
            if (bubble) { bubble.destroy(); bubble = null; }
            const texts = BUBBLE_TEXTS[currentState] || BUBBLE_TEXTS.idle;
            if (currentState === 'idle') return; // no bubble while sitting on sofa

            // Bubble anchor should follow current visible character:
            // - syncing: syncAnimSprite
            // - error state: errorBug
            // - working at desk: starWorking
            // - other: star
            let anchorX = star.x;
            let anchorY = star.y;
            if (currentState === 'syncing' && syncAnimSprite && syncAnimSprite.visible) {
                anchorX = syncAnimSprite.x;
                anchorY = syncAnimSprite.y;
            } else if (currentState === 'error' && window.errorBug && window.errorBug.visible) {
                anchorX = window.errorBug.x;
                anchorY = window.errorBug.y;
            } else if (!star.visible && window.starWorking && window.starWorking.visible) {
                anchorX = window.starWorking.x;
                anchorY = window.starWorking.y;
            }

            const text = texts[Math.floor(Math.random() * texts.length)];
            const bubbleY = anchorY - 70;

            // Slightly enlarge on mobile to avoid blurring
            const isTouch = IS_TOUCH_DEVICE;
            const fontSize = isTouch ? 14 : 12;
            const bg = game.add.rectangle(anchorX, bubbleY, text.length * 10 + 20, 28, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            const txt = game.add.text(anchorX, bubbleY, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000', align: 'center' }).setOrigin(0.5);
            bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(1200); // always above desk/star
            setTimeout(() => { if (bubble) { bubble.destroy(); bubble = null; } }, 3000);
        }

        function showCatBubble() {
            if (!window.catSprite) return;
            if (window.catBubble) { window.catBubble.destroy(); window.catBubble = null; }
            const texts = BUBBLE_TEXTS.cat || ['Meow~', 'Glug glug…'];
            const text = texts[Math.floor(Math.random() * texts.length)];
            const anchorX = window.catSprite.x;
            const anchorY = window.catSprite.y - 60;
            const bg = game.add.rectangle(anchorX, anchorY, text.length * 10 + 20, 24, 0xfffbeb, 0.95);
            bg.setStrokeStyle(2, 0xd4a574);
            const txt = game.add.text(anchorX, anchorY, text, { fontFamily: 'ArkPixel, monospace', fontSize: '11px', fill: '#8b6914', align: 'center' }).setOrigin(0.5);
            window.catBubble = game.add.container(0, 0, [bg, txt]);
            window.catBubble.setDepth(2100); // top layer above cat
            setTimeout(() => { if (window.catBubble) { window.catBubble.destroy(); window.catBubble = null; } }, 4000);
        }

        // False Agent Bubble logic removed, unified with real /agents Data is the standard

        // Start game
        initGame();
    </script>
